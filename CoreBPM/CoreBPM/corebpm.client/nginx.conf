server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker-резолвер для динамического разрешения имён upstream-контейнеров
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Проксирование REST API к серверному контейнеру
    location /api/ {
        set $upstream_server bpm_server;
        proxy_pass         http://$upstream_server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Проксирование SignalR (WebSocket + Long Polling)
    location /hubs/ {
        set $upstream_server bpm_server;
        proxy_pass         http://$upstream_server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        # Увеличенные таймауты для долгоживущих WebSocket-соединений SignalR
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # SPA: отдавать index.html для любых путей (HTML5 History API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статических ресурсов со fingerprint-ами
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

