services:
  # ---------------------------------------------------------------------------
  # База данных (PostgreSQL)
  # ---------------------------------------------------------------------------
  bpm_db:
    container_name: bpm_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${BPM_S_DB_NAME:-corebpm}
      POSTGRES_USER:     ${BPM_S_DB_USER:-corebpm}
      POSTGRES_PASSWORD: ${BPM_S_DB_PASSWORD:?Установите BPM_S_DB_PASSWORD в .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BPM_S_DB_USER:-corebpm} -d ${BPM_S_DB_NAME:-corebpm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend (ASP.NET Core Web API)
  # ---------------------------------------------------------------------------
  bpm_server:
    container_name: bpm_server  
    build:
      context: ./CoreBPM/CoreBPM
      dockerfile: CoreBPM.Server/Dockerfile
    restart: unless-stopped
    depends_on:
      bpm_db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS:  "8080"
      # Строка подключения к БД (BPM_S_ → ConnectionStrings:DefaultConnection)
      # Требует добавления builder.Configuration.AddEnvironmentVariables("BPM_S_") в Program.cs
      BPM_S_ConnectionStrings__DefaultConnection: >-
        Host=bpm_db;Port=5432;Database=${BPM_S_DB_NAME:-corebpm};
        Username=${BPM_S_DB_USER:-corebpm};
        Password=${BPM_S_DB_PASSWORD}
      # JWT-настройки (BPM_S_ → Jwt:*)
      BPM_S_Jwt__SecretKey:    ${BPM_S_Jwt__SecretKey:?Установите BPM_S_Jwt__SecretKey в .env}
      BPM_S_Jwt__Issuer:       ${BPM_S_Jwt__Issuer:-CoreBPM}
      BPM_S_Jwt__Audience:     ${BPM_S_Jwt__Audience:-CoreBPM}
      BPM_S_Jwt__AccessTokenLifetimeMinutes: ${BPM_S_Jwt__AccessTokenLifetimeMinutes:-30}
      BPM_S_Jwt__RefreshTokenExpirationDays: ${BPM_S_Jwt__RefreshTokenExpirationDays:-7}
      # Пароль начального администратора (BPM_S_ → Admin:Password)
      BPM_S_Admin__Password: ${BPM_S_Admin__Password:?Установите BPM_S_Admin__Password в .env}
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Frontend (React SPA, раздаётся Nginx)
  # ---------------------------------------------------------------------------
  bpm_client:
    container_name: bpm_client  
    build:
      context: ./CoreBPM/CoreBPM/corebpm.client
      dockerfile: Dockerfile
      # Переменные сборки Vite (доступны в приложении как import.meta.env.BPM_C_*)
      # Добавляйте переменные BPM_C_ при необходимости, например:
      # args:
      #   BPM_C_SOME_FEATURE_FLAG: "true"
    restart: unless-stopped
    depends_on:
      - bpm_server
    ports:
      - "${BPM_C_PORT:-80}:80"

volumes:
  db_data:
