services:
  # ---------------------------------------------------------------------------
  # База данных (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${BPM_S_DB_NAME:-openbpm}
      POSTGRES_USER:     ${BPM_S_DB_USER:-openbpm}
      POSTGRES_PASSWORD: ${BPM_S_DB_PASSWORD:?Установите BPM_S_DB_PASSWORD в .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BPM_S_DB_USER:-openbpm} -d ${BPM_S_DB_NAME:-openbpm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend (ASP.NET Core Web API)
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ./OpenBPM
      dockerfile: OpenBPM.Server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS:  "8080"
      # Строка подключения к БД (BPM_S_ → ConnectionStrings:DefaultConnection)
      # Требует добавления builder.Configuration.AddEnvironmentVariables("BPM_S_") в Program.cs
      BPM_S_ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${BPM_S_DB_NAME:-openbpm};
        Username=${BPM_S_DB_USER:-openbpm};
        Password=${BPM_S_DB_PASSWORD}
    expose:
      - "8080"

  # ---------------------------------------------------------------------------
  # Frontend (React SPA, раздаётся Nginx)
  # ---------------------------------------------------------------------------
  client:
    build:
      context: ./OpenBPM/openbpm.client
      dockerfile: Dockerfile
      args:
        # Переменные сборки Vite (доступны в приложении как import.meta.env.BPM_C_*)
        # Добавляйте переменные BPM_C_ при необходимости, например:
        # BPM_C_SOME_FEATURE_FLAG: "true"
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${BPM_C_PORT:-80}:80"

volumes:
  db_data:
